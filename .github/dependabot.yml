version: 2
updates:
  - package-ecosystem: npm
    directory: /Legacy.Maliev.Web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns: ["*"]
        update-types:
          - minor
          - patch
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuget-dependencies:
        applies-to: version-updates
        patterns: ["*"]
        update-types:
          - minor
          - patch
  - package-ecosystem: docker
    directory: /Legacy.Maliev.Web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker-dependencies:
        applies-to: version-updates
        patterns: ["*"]
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        applies-to: version-updates
        patterns: ["*"]
        update-types:
          - minor
          - patch
